apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-nexus-images
spec:
  validationFailureAction: Audit
  background: false
  rules:
    - name: verify-ghcr-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - nexus-ai
      verifyImages:
        - imageReferences:
            - "ghcr.io/*/nexus-ai-run:*"
          mutateDigest: true
          attestors:
            - entries:
                - keyless:
                    subject: "https://github.com/*"
                    issuer: "https://token.actions.githubusercontent.com"
