name: Rotate Kubernetes Secrets

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: "Kubernetes namespace"
        required: true
        default: "nexus-ai"
      secret_name:
        description: "Secret name"
        required: true
        default: "nexus-secrets"

permissions:
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config

      - name: Rotate secrets and restart
        env:
          NAMESPACE: ${{ inputs.namespace }}
          SECRET_NAME: ${{ inputs.secret_name }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VECTOR_ENDPOINT: ${{ secrets.VECTOR_ENDPOINT }}
          VECTOR_API_KEY: ${{ secrets.VECTOR_API_KEY }}
        run: bash deploy/scripts/rotate-secrets.sh
