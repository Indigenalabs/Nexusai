apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nexus-backend-restrict
  namespace: nexus-ai
spec:
  podSelector:
    matchLabels:
      app: nexus-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8787
    - from:
        - podSelector:
            matchLabels:
              app: nexus-backend
      ports:
        - protocol: TCP
          port: 8787
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nexus-ai
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
