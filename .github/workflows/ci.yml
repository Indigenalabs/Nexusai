name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  app-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm install

      - name: Lint (strict: fail on warnings)
        run: npm run lint:strict

      - name: Build
        run: npm run build

      - name: Action coverage audit
        run: npm run test:actions

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: app-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Start preview
        run: npm run preview -- --host 127.0.0.1 --port 5173 &

      - name: Wait for preview
        run: npx wait-on http://127.0.0.1:5173

      - name: Run E2E smoke
        run: npm run test:e2e

