version: "3.9"

services:
  nexus-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexus-ai-run:latest
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - .env.production
    volumes:
      - ./backend/.data:/app/backend/.data
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5432:5432"
    volumes:
      - nexus_pg_data:/var/lib/postgresql/data

volumes:
  nexus_pg_data:
