apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-backend
  namespace: nexus-ai
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-backend
                port:
                  number: 80
